// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
    maven {
      // All of Detox's dependencies are located in the npm package
      url "$rootDir/../node_modules/detox/android"
    }
  }
  // Help native modules that resolve paths via rootProject.ext (EAS + monorepo-safe).
  ext.REACT_NATIVE_NODE_MODULES_DIR = file("${rootDir}/../node_modules/react-native")
}

subprojects {
  afterEvaluate { project ->
    if (project.hasProperty("android")) {
      project.android {
        packagingOptions {
          pickFirsts += '**/*.so'
        }
      }
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
